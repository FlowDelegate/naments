name: Release & Publish

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Skip if this push is already a version bump (avoid infinite loop)
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: check
        run: |
          MSG=$(git log -1 --pretty=%s)
          if echo "$MSG" | grep -qE "^chore: release v[0-9]"; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Skipping — this is a version bump commit"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "New code merged — will bump, test, and publish"
          fi

  test:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

  release:
    needs: [check, test]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - run: npm ci

      # Bump patch version, commit, and tag
      - name: Bump version
        run: |
          git config user.name "flowdelegate-bot"
          git config user.email "bot@flowdelegate.com"
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          git add package.json package-lock.json
          git commit -m "chore: release ${NEW_VERSION}"
          git tag "${NEW_VERSION}"
          echo "NEW_VERSION=${NEW_VERSION}" >> "$GITHUB_ENV"

      # Build and publish
      - run: npm run build
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Push version bump and tag back to main
      - name: Push release commit and tag
        run: |
          git push origin main
          git push origin "${NEW_VERSION}"

      - run: echo "Released ${NEW_VERSION} to npm"
